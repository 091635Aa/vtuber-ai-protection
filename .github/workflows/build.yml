name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: "1.0.${{ github.run_number }}"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⚙️ Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            libffi-dev \
            libssl-dev \
            libncurses-dev \
            libsqlite3-dev \
            libjpeg-dev \
            zlib1g-dev \
            libfreetype6-dev \
            liblcms2-dev \
            libgl1-mesa-dev

      - name: 🧪 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython buildozer kivy pillow plyer

      - name: 🛠️ Set Buildozer Version
        run: |
          echo "app.version.code = $VERSION_CODE" >> buildozer.spec
          echo "app.version = $VERSION_NAME" >> buildozer.spec

      - name: 📦 Build APK
        run: |
          buildozer android debug

      - name: ⬆️ Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vtuber-ai-protection-apk
          path: bin/*.apk
