name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: "1.0.${{ github.run_number }}"
      PIP_NO_CACHE_DIR: 1
      PYTHONUNBUFFERED: 1

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Upgrade pip and install basic tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip --version

      - name: ⚙️ Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            libffi-dev \
            libssl-dev \
            libncurses5-dev \
            libsqlite3-dev \
            libjpeg-dev \
            zlib1g-dev \
            libfreetype6-dev \
            liblcms2-dev \
            libgl1-mesa-dev \
            libglib2.0-dev \
            wget \
            ca-certificates
          sudo apt clean

      - name: 🧪 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==2.3.1
          pip install cython==3.0.12
          pip install kivy==2.3.0
          pip install pillow==10.2.0
          pip install plyer==2.1.0
          pip install requests
          pip install packaging
          
      - name: 📝 Show installed packages
        run: |
          pip list
          python --version
          java -version

      - name: 🛠️ Prepare buildozer.spec
        run: |
          echo "app.version.code = $VERSION_CODE" >> buildozer.spec
          echo "app.version = $VERSION_NAME" >> buildozer.spec
          cat buildozer.spec

      - name: 📦 Build APK (Debug)
        run: |
          buildozer android debug
        env:
          BUILDVERBOSE: 1
          
      - name: 📋 Show build logs
        if: failure()
        run: |
          echo "=== Buildozer logs ==="
          find . -name "*.log" -type f -exec cat {} \; || true
          echo "=== Bin directory ==="
          ls -la bin/ || true

      - name: ⬆️ Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vtuber-ai-protection-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
